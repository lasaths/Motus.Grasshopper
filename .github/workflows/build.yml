name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Motus.GH (net8.0-windows)
        run: dotnet build src/Motus.GH/Motus.GH.csproj -c Release

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Motus.GH (net8.0)
        run: dotnet build src/Motus.GH/Motus.GH.csproj -c Release -f net8.0

  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Grasshopper .gha build requires Rhino 8 on the machine — run ./build.ps1 locally.
      - name: Fetch UR10e example meshes
        run: node scripts/fetch-ur10e-assets.mjs

      - name: Regenerate + validate example GHX
        run: |
          node scripts/generate-examples.mjs
          git diff --exit-code -- examples/*.ghx
          node scripts/validate-ghx.mjs

      - name: Planner-only dependency fence
        shell: bash
        run: |
          if rg -n -i "(rtde|socket|tcpclient|udpclient|serialport|modbus|opcua|robot command)" src/Motus.GH; then
            echo "Planner-only fence failed: control transport dependency detected."
            exit 1
          fi

      # Compiles against NuGet RhinoCommon (ref-only). Runtime loads Rhino 8 System\RhinoCommon.dll.
      - name: Build QA smoke
        run: dotnet build scripts/qa-smoke/QaSmoke.csproj -c Release

      - name: QA smoke (requires Rhino 8 install)
        shell: pwsh
        run: |
          $candidates = @()
          if ($env:Rhino8Dir) { $candidates += (Join-Path $env:Rhino8Dir 'System\RhinoCommon.dll') }
          $candidates += (Join-Path ${env:ProgramFiles} 'Rhino 8\System\RhinoCommon.dll')
          $rhino = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $rhino) {
            Write-Host '::notice title=qa-smoke skipped::No Rhino 8 on this runner — validate-ghx + compile only. REQUIRED before Rhino-touching releases: ./scripts/verify-qa.ps1 -Configuration Release -Install (or dotnet run --project scripts/qa-smoke/QaSmoke.csproj -c Release) on a machine with Rhino 8 / Rhino8Dir.'
            exit 0
          }
          Write-Host "Using RhinoCommon: $rhino"
          dotnet run --project scripts/qa-smoke/QaSmoke.csproj -c Release --no-build
