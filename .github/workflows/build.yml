name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: QA smoke (Motus.NET from NuGet)
        run: dotnet run --project scripts/qa-smoke/QaSmoke.csproj -c Release

      - name: Build Motus.Grasshopper
        run: dotnet build Motus.Grasshopper.slnx -c Release
        continue-on-error: true

      - name: Package zip
        shell: pwsh
        run: ./build.ps1 -Configuration Release -Zip

      - uses: actions/upload-artifact@v4
        with:
          name: Motus.Grasshopper-Release
          path: dist/*.zip
