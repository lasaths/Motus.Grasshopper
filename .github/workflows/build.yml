name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Grasshopper .gha build requires Rhino 8 on the machine — run ./build.ps1 locally.
      - name: Validate example GHX files
        run: node scripts/validate-ghx.mjs

      - name: QA smoke (Motus.NET from NuGet)
        run: dotnet run --project scripts/qa-smoke/QaSmoke.csproj -c Release
